<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulário de Pedidos de Oração</title>
</head>
<link rel="stylesheet" href="style.css">
<body>
<div class="container">
  <header>
    <h1>🙏 Pedidos de Oração</h1>
    <p class="verse">"Muito pode, por sua eficácia, a súplica do justo." — Tiago 5:16</p>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="showTab('new', event)">➕ Novo Pedido</button>
    <button class="tab" onclick="showTab('list', event)">📋 Lista</button>
    <button class="tab" onclick="showTab('stats', event)">📊 Resumo</button>
  </div>

  <div class="content">
    <!-- NOVO PEDIDO -->
    <div id="new" class="section active">
      <form id="prayerForm">
        <div class="form-group">
          <label>Nome do Solicitante *</label>
          <input type="text" id="nome" required>
        </div>

        <div class="form-group">
          <label>Data do Pedido *</label>
          <input type="date" id="dataPedido" required>
        </div>

        <div class="form-group">
          <label>Categoria(s)</label>
          <div class="checkbox-group">
            <div class="checkbox-item"><input type="checkbox" id="cat1" value="Saúde física"><label for="cat1">Saúde física</label></div>
            <div class="checkbox-item"><input type="checkbox" id="cat2" value="Saúde emocional"><label for="cat2">Saúde emocional</label></div>
            <div class="checkbox-item"><input type="checkbox" id="cat3" value="Família"><label for="cat3">Família</label></div>
            <div class="checkbox-item"><input type="checkbox" id="cat4" value="Trabalho/Estudos"><label for="cat4">Trabalho/Estudos</label></div>
            <div class="checkbox-item"><input type="checkbox" id="cat5" value="Finanças"><label for="cat5">Finanças</label></div>
            <div class="checkbox-item"><input type="checkbox" id="cat6" value="Relacionamentos"><label for="cat6">Relacionamentos</label></div>
            <div class="checkbox-item"><input type="checkbox" id="cat7" value="Salvação"><label for="cat7">Salvação</label></div>
            <div class="checkbox-item"><input type="checkbox" id="cat8" value="Direção"><label for="cat8">Direção</label></div>
            <div class="checkbox-item"><input type="checkbox" id="cat9" value="Gratidão"><label for="cat9">Gratidão</label></div>
          </div>
        </div>

        <div class="form-group">
          <label>Para quem é o pedido?</label>
          <div class="radio-group">
            <div class="radio-item"><input type="radio" name="paraQuem" value="Para mim" id="r1" checked><label for="r1">Para mim</label></div>
            <div class="radio-item"><input type="radio" name="paraQuem" value="Para outra pessoa" id="r2"><label for="r2">Para outra pessoa</label></div>
          </div>
        </div>

        <div class="form-group">
          <label>Descrição do Pedido *</label>
          <textarea id="descricao" required placeholder="Descreva o pedido de oração..."></textarea>
        </div>

        <div class="form-group">
          <label>Versículo Bíblico (opcional)</label>
          <input type="text" id="versiculo" placeholder="Ex: Filipenses 4:13">
        </div>

        <div class="form-group">
          <label>Nível de Urgência</label>
          <select id="urgencia">
            <option value="Pontual">Pontual</option>
            <option value="Urgente">Urgente</option>
            <option value="Contínuo">Contínuo (oração diária)</option>
          </select>
        </div>

        <div class="form-group">
          <label>Confidencialidade</label>
          <div class="radio-group">
            <div class="radio-item"><input type="radio" name="conf" value="Compartilhado" id="c1" checked><label for="c1">Pode compartilhar</label></div>
            <div class="radio-item"><input type="radio" name="conf" value="Confidencial" id="c2"><label for="c2">Confidencial</label></div>
          </div>
        </div>

        <button type="submit" class="btn">💾 Salvar Pedido</button>
      </form>
    </div>

    <!-- LISTA -->
    <div id="list" class="section">
      <div class="filter-bar">
        <button class="filter-btn active" onclick="filterList('todos', event)">Todos</button>
        <button class="filter-btn" onclick="filterList('aguardando', event)">⏳ Aguardando</button>
        <button class="filter-btn" onclick="filterList('respondido', event)">✅ Respondidos</button>
        <button class="filter-btn" onclick="filterList('diferente', event)">🙏 Resp. diferente</button>
      </div>
      <div id="prayerList" class="prayer-list"></div>
    </div>

    <!-- RESUMO -->
    <div id="stats" class="section">
      <div class="stats" id="statsContainer"></div>
      <h3 style="color:#5a3a8a; margin: 20px 0 10px;">Ações</h3>
      <div class="export-buttons">
        <button class="btn" onclick="exportData()">📥 Exportar (JSON)</button>
        <button class="btn btn-secondary" onclick="exportText()">📄 Exportar (Texto)</button>
        <button class="btn btn-danger" onclick="confirmClear()">🗑️ Limpar Tudo</button>
      </div>
      <p style="margin-top:15px; font-size:0.85em; color:#888; text-align:center;">
        ⚠️ Os dados são salvos apenas durante esta sessão. Use "Exportar" para guardar permanentemente.
      </p>
    </div>
  </div>
</div>

<!-- MODAL DE RESPOSTA -->
<div class="modal-overlay" id="responseModal">
  <div class="modal">
    <h3>Registrar Resposta de Deus</h3>
    <div class="form-group">
      <label>Data da Resposta</label>
      <input type="date" id="dataResposta">
    </div>
    <div class="form-group">
      <label>Tipo de Resposta</label>
      <select id="tipoResposta">
        <option value="respondido">✅ Sim, conforme pedido</option>
        <option value="diferente">🙏 Sim, de forma diferente</option>
        <option value="espere">⏳ Resposta foi "espere"</option>
      </select>
    </div>
    <div class="form-group">
      <label>Testemunho / Como Deus respondeu</label>
      <textarea id="testemunho" placeholder="Descreva como Deus agiu..."></textarea>
    </div>
    <div class="form-group">
      <label>O que aprendi com essa experiência?</label>
      <textarea id="aprendizado" placeholder="Lições aprendidas..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-success" onclick="saveResponse()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL DE CONFIRMAÇÃO -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal">
    <h3 id="confirmTitle">Confirmar</h3>
    <p id="confirmMessage" style="margin: 10px 0; line-height: 1.5;"></p>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeConfirm()">Cancelar</button>
      <button class="btn btn-danger" id="confirmBtn">Confirmar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let prayers = [];
  let currentResponseId = null;
  let currentFilter = 'todos';

  // Define data atual no formulário
  document.getElementById('dataPedido').valueAsDate = new Date();
  document.getElementById('dataResposta').valueAsDate = new Date();

  // Tentar carregar do localStorage
  try {
    const saved = localStorage.getItem('prayers');
    if (saved) prayers = JSON.parse(saved);
  } catch(e) {}

  function savePrayers() {
    try {
      localStorage.setItem('prayers', JSON.stringify(prayers));
    } catch(e) {}
  }

  function showTab(tabId, ev) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    ev.target.classList.add('active');
    if (tabId === 'list') renderList();
    if (tabId === 'stats') renderStats();
  }

  document.getElementById('prayerForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const categorias = [];
    document.querySelectorAll('.checkbox-group input:checked').forEach(c => categorias.push(c.value));

    const prayer = {
      id: Date.now(),
      nome: document.getElementById('nome').value,
      dataPedido: document.getElementById('dataPedido').value,
      categorias: categorias,
      paraQuem: document.querySelector('input[name="paraQuem"]:checked').value,
      descricao: document.getElementById('descricao').value,
      versiculo: document.getElementById('versiculo').value,
      urgencia: document.getElementById('urgencia').value,
      confidencialidade: document.querySelector('input[name="conf"]:checked').value,
      status: 'aguardando',
      dataResposta: null,
      testemunho: null,
      aprendizado: null
    };

    prayers.unshift(prayer);
    savePrayers();
    this.reset();
    document.getElementById('dataPedido').valueAsDate = new Date();
    showToast('✅ Pedido salvo com sucesso!');
  });

  function renderList() {
    const list = document.getElementById('prayerList');
    let filtered = prayers;
    if (currentFilter !== 'todos') {
      filtered = prayers.filter(p => p.status === currentFilter);
    }

    if (filtered.length === 0) {
      list.innerHTML = <div class="empty-state"><div class="icon">🙏</div><p>Nenhum pedido encontrado.</p></div>;
      return;
    }

    list.innerHTML = filtered.map(p => {
      const statusInfo = getStatusInfo(p.status);
      const cardClass = p.status === 'respondido' ? 'answered' : (p.status === 'diferente' ? 'different' : '');
      const diasDecorridos = p.dataResposta ? calcDays(p.dataPedido, p.dataResposta) : calcDays(p.dataPedido, new Date().toISOString().split('T')[0]);
      
      return `
        <div class="prayer-card ${cardClass}">
          <div class="prayer-header">
            <span class="prayer-name">${escapeHtml(p.nome)}</span>
            <span class="status-badge ${statusInfo.class}">${statusInfo.label}</span>
          </div>
          <div class="prayer-date">📅 Pedido: ${formatDate(p.dataPedido)} ${p.dataResposta ? '| ✨ Resposta: ' + formatDate(p.dataResposta) : ''}</div>
          <div style="margin-top: 8px;">
            ${p.categorias.map(c => <span class="prayer-category">${escapeHtml(c)}</span>).join('')}
          </div>
          <div class="prayer-desc">${escapeHtml(p.descricao)}</div>
          ${p.versiculo ? <div style="font-style:italic; color:#666; font-size:0.9em;">📖 ${escapeHtml(p.versiculo)}</div> : ''}
          <div style="font-size:0.85em; color:#666; margin-top:5px;">
            <strong>${p.paraQuem}</strong> | Urgência: ${p.urgencia} | ${diasDecorridos} dia(s)
          </div>
          ${p.testemunho ? `
            <div class="prayer-status">
              <strong style="color:#2e7d32;">✨ Testemunho:</strong>
              <p style="margin-top:5px;">${escapeHtml(p.testemunho)}</p>
              ${p.aprendizado ? <p style="margin-top:8px;"><strong>💡 Aprendizado:</strong> ${escapeHtml(p.aprendizado)}</p> : ''}
            </div>
          ` : ''}
          <div style="margin-top: 12px; display:flex; gap:6px; flex-wrap:wrap;">
            ${p.status === 'aguardando' ? <button class="btn btn-small btn-success" onclick="openResponse(${p.id})">✅ Registrar Resposta</button> : <button class="btn btn-small btn-secondary" onclick="openResponse(${p.id})">✏️ Editar Resposta</button>}
            <button class="btn btn-small btn-danger" onclick="confirmDelete(${p.id})">🗑️ Excluir</button>
          </div>
        </div>
      `;
    }).join('');
  }

  function getStatusInfo(status) {
    if (status === 'respondido') return {class: 'status-answered', label: '✅ Respondido'};
    if (status === 'diferente') return {class: 'status-different', label: '🙏 Resposta diferente'};
    if (status === 'espere') return {class: 'status-waiting', label: '⏳ Aguardar'};
    return {class: 'status-waiting', label: '⏳ Em oração'};
  }

  function filterList(filter, ev) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    ev.target.classList.add('active');
    renderList();
  }

  function openResponse(id) {
    currentResponseId = id;
    const p = prayers.find(x => x.id === id);
    document.getElementById('dataResposta').value = p.dataResposta || new Date().toISOString().split('T')[0];
    document.getElementById('tipoResposta').value = p.status === 'aguardando' ? 'respondido' : p.status;
    document.getElementById('testemunho').value = p.testemunho || '';
    document.getElementById('aprendizado').value = p.aprendizado || '';
    document.getElementById('responseModal').classList.add('show');
  }

  function closeModal() {
    document.getElementById('responseModal').classList.remove('show');
    currentResponseId = null;
  }

  function saveResponse() {
    const p = prayers.find(x => x.id === currentResponseId);
    if (!p) return;
    p.dataResposta = document.getElementById('dataResposta').value;
    p.status = document.getElementById('tipoResposta').value;
    p.testemunho = document.getElementById('testemunho').value;
    p.aprendizado = document.getElementById('aprendizado').value;
    savePrayers();
    closeModal();
    renderList();
    showToast('🙌 Resposta registrada! Glória a Deus!');
  }

  function confirmDelete(id) {
    document.getElementById('confirmTitle').textContent = 'Excluir Pedido';
    document.getElementById('confirmMessage').textContent = 'Tem certeza que deseja excluir este pedido?';
    document.getElementById('confirmBtn').onclick = () => {
      prayers = prayers.filter(p => p.id !== id);
      savePrayers();
      closeConfirm();
      renderList();
      showToast('Pedido excluído.');
    };
    document.getElementById('confirmModal').classList.add('show');
  }

  function confirmClear() {
    document.getElementById('confirmTitle').textContent = 'Limpar Todos os Pedidos';
    document.getElementById('confirmMessage').textContent = 'Tem certeza que deseja excluir TODOS os pedidos? Esta ação não pode ser desfeita. Recomendamos exportar antes.';
    document.getElementById('confirmBtn').onclick = () => {
      prayers = [];
      savePrayers();
      closeConfirm();
      renderList();
      renderStats();
      showToast('Todos os pedidos foram removidos.');
    };
    document.getElementById('confirmModal').classList.add('show');
  }

  function closeConfirm() {
    document.getElementById('confirmModal').classList.remove('show');
  }

  function renderStats() {
    const total = prayers.length;
    const aguardando = prayers.filter(p => p.status === 'aguardando').length;
    const respondidos = prayers.filter(p => p.status === 'respondido').length;
    const diferentes = prayers.filter(p => p.status === 'diferente').length;
    
    document.getElementById('statsContainer').innerHTML = `
      <div class="stat-card"><div class="stat-number">${total}</div><div class="stat-label">Total</div></div>
      <div class="stat-card" style="background:linear-gradient(135deg,#ffa726,#fb8c00);"><div class="stat-number">${aguardando}</div><div class="stat-label">Aguardando</div></div>
      <div class="stat-card" style="background:linear-gradient(135deg,#66bb6a,#43a047);"><div class="stat-number">${respondidos}</div><div class="stat-label">Respondidos</div></div>
      <div class="stat-card" style="background:linear-gradient(135deg,#ab47bc,#8e24aa);"><div class="stat-number">${diferentes}</div><div class="stat-label">Resp. diferente</div></div>
    `;
  }

  function exportData() {
    const dataStr = JSON.stringify(prayers, null, 2);
    const blob = new Blob([dataStr], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = pedidos-oracao-${new Date().toISOString().split('T')[0]}.json;
    a.click();
    URL.revokeObjectURL(url);
    showToast('📥 Arquivo exportado!');
  }

  function exportText() {
    let text = 'PEDIDOS DE ORAÇÃO\n';
    text += '"Muito pode, por sua eficácia, a súplica do justo." - Tiago 5:16\n';
    text += '='.repeat(50) + '\n\n';
    prayers.forEach((p, i) => {
      text += ${i+1}. ${p.nome}\n;
      text += Data do pedido: ${formatDate(p.dataPedido)}\n;
      text += Categorias: ${p.categorias.join(', ') || '-'}\n;
      text += Para: ${p.paraQuem}\n;
      text += Urgência: ${p.urgencia}\n;
      text += Pedido: ${p.descricao}\n;
      if (p.versiculo) text += Versículo: ${p.versiculo}\n;
      text += Status: ${getStatusInfo(p.status).label}\n;
      if (p.dataResposta) text += Data da resposta: ${formatDate(p.dataResposta)}\n;
      if (p.testemunho) text += Testemunho: ${p.testemunho}\n;
      if (p.aprendizado) text += Aprendizado: ${p.aprendizado}\n;
      text += '-'.repeat(50) + '\n\n';
    });
    const blob = new Blob([text], {type: 'text/plain;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = pedidos-oracao-${new Date().toISOString().split('T')[0]}.txt;
    a.click();
    URL.revokeObjectURL(url);
    showToast('📄 Texto exportado!');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function formatDate(dateStr) {
    if (!dateStr) return '-';
    const [y, m, d] = dateStr.split('-');
    return ${d}/${m}/${y};
  }

  function calcDays(start, end) {
    const d1 = new Date(start);
    const d2 = new Date(end);
    return Math.floor((d2 - d1) / (1000 * 60 * 60 * 24));
  }

  function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // Renderizar inicial
  renderList();
  renderStats();
</script>
</body>
</html>
